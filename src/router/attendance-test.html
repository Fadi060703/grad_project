<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Attendance Test Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --success: #10b981;
      --error: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Base URL config */
    .config-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      align-items: center;
    }
    .config-bar input {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .config-bar label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Tab switcher */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input[type="number"],
    input[type="text"],
    input[type="url"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }
    input:focus { border-color: var(--accent); }

    button.btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }
    button.btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      color: white;
    }
    button.btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    button.btn-cyan {
      background: linear-gradient(135deg, var(--accent2), #0284c7);
      color: white;
    }
    button.btn-cyan:hover { opacity: 0.88; transform: translateY(-1px); }
    button.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* QR display */
    #qr-box {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: white;
      border-radius: 12px;
      margin-top: 16px;
    }
    #qr-box.visible { display: flex; }
    #qr-render { margin-bottom: 12px; }
    #qr-token {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #333;
      word-break: break-all;
      text-align: center;
    }

    /* Camera / scanner */
    #scanner-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin-top: 16px;
      display: none;
    }
    #scanner-wrap.visible { display: block; }
    #scanner-video {
      width: 100%;
      display: block;
    }
    #scanner-canvas { display: none; }
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-frame {
      width: 180px;
      height: 180px;
      border: 2px solid var(--accent2);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      position: relative;
    }
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent2);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 8px var(--accent2);
    }
    @keyframes scan {
      0%   { top: 0; }
      100% { top: 100%; }
    }

    /* Toast / result */
    .toast {
      display: none;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
    }
    .toast.visible { display: block; }
    .toast.success { background: rgba(16,185,129,0.15); border: 1px solid var(--success); color: var(--success); }
    .toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid var(--error);   color: var(--error); }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Attendance Test Tool</h1>
    <p>Dev / QA — not for production</p>
  </header>

  <!-- Base URL -->
  <div class="config-bar">
    <label>API</label>
    <input type="url" id="base-url" value="https://b85d-89-38-99-79.ngrok-free.app" placeholder="https://abc123.ngrok.io"/>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('teacher')">👨‍🏫 Teacher</button>
    <button class="tab-btn"        onclick="switchTab('student')">🎓 Student</button>
  </div>

  <!-- TEACHER TAB -->
  <div class="tab-panel active" id="tab-teacher">
    <div class="card">
      <div class="card-title">Generate QR Code</div>
      <label>Weekly Lecture ID</label>
      <input type="number" id="t-wl-id" placeholder="e.g. 1"/>
      <button class="btn btn-primary" onclick="generateQR()">Generate &amp; Publish</button>
      <div id="qr-box">
        <div id="qr-render"></div>
        <div id="qr-token"></div>
      </div>
      <div class="toast" id="t-toast"></div>
    </div>
  </div>

  <!-- STUDENT TAB -->
  <div class="tab-panel" id="tab-student">
    <div class="card">
      <div class="card-title">Mark Attendance</div>
      <label>Student ID</label>
      <!-- TODO: remove this field and read student_id from auth token instead -->
      <input type="number" id="s-student-id" placeholder="e.g. 1"/>
      <button class="btn btn-cyan" onclick="toggleCamera()" id="scan-btn">📷 Start Camera Scan</button>

      <div id="scanner-wrap">
        <video id="scanner-video" autoplay playsinline muted></video>
        <canvas id="scanner-canvas"></canvas>
        <div class="scan-overlay">
          <div class="scan-frame">
            <div class="scan-line"></div>
          </div>
        </div>
      </div>

      <div class="toast" id="s-toast"></div>
    </div>
  </div>

</div>

<script>
  // ── Tab switching ──────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    stopCamera();
  }

  function baseURL() {
    return document.getElementById('base-url').value.replace(/\/$/, '');
  }

  // ── Toast helpers ──────────────────────────────────────────────────────────
  function showToast(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `toast visible ${type}`;
  }

  // ── TEACHER: Generate QR ──────────────────────────────────────────────────
  async function generateQR() {
    const wlId = document.getElementById('t-wl-id').value;
    if (!wlId) return showToast('t-toast', 'Enter a Weekly Lecture ID', 'error');

    try {
      const res = await fetch(`${baseURL()}/api/weekly-lectures/${wlId}/publish`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      });
      const data = await res.json();

      if (!res.ok) {
        showToast('t-toast', data.message || 'Failed to publish', 'error');
        return;
      }

      const qrString = data.data.qr_string;
      const payload  = JSON.stringify({ qr_string: qrString, weekly_lecture_id: Number(wlId) });

      // Render QR
      document.getElementById('qr-render').innerHTML = '';
      new QRCode(document.getElementById('qr-render'), {
        text: payload,
        width: 220,
        height: 220,
        colorDark: '#000000',
        colorLight: '#ffffff',
      });
      document.getElementById('qr-token').textContent = `token: ${qrString}`;
      document.getElementById('qr-box').classList.add('visible');
      showToast('t-toast', '✅ QR generated successfully', 'success');

    } catch (err) {
      showToast('t-toast', 'Network error: ' + err.message, 'error');
    }
  }

  // ── STUDENT: Camera / QR scan ─────────────────────────────────────────────
  let stream = null;
  let scanInterval = null;

  async function toggleCamera() {
    if (stream) { stopCamera(); return; }

    const wrap  = document.getElementById('scanner-wrap');
    const video = document.getElementById('scanner-video');
    const btn   = document.getElementById('scan-btn');

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      video.srcObject = stream;
      wrap.classList.add('visible');
      btn.textContent = '⛔ Stop Camera';

      video.addEventListener('loadedmetadata', () => {
        startScanning();
      });

    } catch (err) {
      showToast('s-toast', 'Camera error: ' + err.message, 'error');
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
    document.getElementById('scanner-wrap').classList.remove('visible');
    document.getElementById('scan-btn').textContent = '📷 Start Camera Scan';
  }

  function startScanning() {
    const video  = document.getElementById('scanner-video');
    const canvas = document.getElementById('scanner-canvas');
    const ctx    = canvas.getContext('2d');

    scanInterval = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert',
      });

      if (code) {
        stopCamera();
        handleQRResult(code.data);
      }
    }, 300);
  }

  async function handleQRResult(raw) {
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch {
      showToast('s-toast', 'Invalid QR code format', 'error');
      return;
    }

    const { qr_string, weekly_lecture_id } = parsed;
    if (!qr_string || !weekly_lecture_id) {
      showToast('s-toast', 'QR missing required fields', 'error');
      return;
    }

    // TODO: replace student_id with value from auth token
    const studentId = parseInt(document.getElementById('s-student-id').value, 10);
    if (isNaN(studentId)) {
      showToast('s-toast', 'Enter a valid Student ID first', 'error');
      return;
    }

    try {
      const res = await fetch(`${baseURL()}/api/attendance/mark`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          student_id: studentId,         // TODO: remove — take from token
          weekly_lecture_id,
          qr_string,
        }),
      });

      const data = await res.json();

      if (res.ok) {
        showToast('s-toast', '✅ Attendance marked!', 'success');
      } else {
        showToast('s-toast', '❌ ' + (data.message || 'Failed'), 'error');
      }

    } catch (err) {
      showToast('s-toast', 'Network error: ' + err.message, 'error');
    }
  }
</script>
</body>
</html>
